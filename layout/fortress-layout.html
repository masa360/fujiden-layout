<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>要塞（フォートレス）レイアウト設計図</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #07090e;
      --panel:   #0b1220;
      --border:  #1a3060;
      --text:    #90b8d8;
      --accent:  #ff7700;
      --dim:     #3a5a7a;
      --ok:      #44cc77;
      --warn:    #ffcc00;
      --ng:      #ff4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
    }
    header {
      background: linear-gradient(90deg, #050810 0%, #0d1f3a 50%, #050810 100%);
      border-bottom: 2px solid var(--accent);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    header h1 {
      font-family: 'Orbitron', monospace;
      font-size: 1.3em;
      color: var(--accent);
      text-shadow: 0 0 18px rgba(255,119,0,.6);
      letter-spacing: .15em;
    }
    header .badge {
      font-size: .65em;
      color: var(--dim);
      border: 1px solid var(--dim);
      padding: 2px 8px;
      letter-spacing: .15em;
    }
    .main-grid {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 2px;
      background: #030508;
      min-width: 1220px;
    }
    body { overflow-x: auto; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 14px;
    }
    .ptitle {
      font-family: 'Orbitron', monospace;
      font-size: .65em;
      letter-spacing: .2em;
      color: var(--accent);
      text-transform: uppercase;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 12px;
    }
    /* floor tabs */
    .tabs { display: flex; gap: 2px; margin-bottom: 10px; }
    .tab {
      flex: 1;
      padding: 7px 2px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--dim);
      font-family: 'Orbitron', monospace;
      font-size: .62em;
      cursor: pointer;
      letter-spacing: .08em;
      transition: all .15s;
    }
    .tab:hover { border-color: var(--accent); color: var(--text); }
    .tab.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
    canvas { display: block; }
    /* bottom calc section */
    .bottom {
      grid-column: 1 / -1;
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 14px;
    }
    .calc-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 10px;
    }
    .calc-card {
      border: 1px solid rgba(255,119,0,.25);
      background: rgba(255,119,0,.04);
      padding: 10px 12px;
    }
    .calc-card .clabel {
      font-size: .6em;
      color: var(--dim);
      letter-spacing: .1em;
      margin-bottom: 4px;
    }
    .calc-card .cval {
      font-family: 'Orbitron', monospace;
      font-size: 1.05em;
      color: var(--accent);
    }
    .calc-card .cunit { font-size: .7em; color: var(--dim); }
    table { width: 100%; border-collapse: collapse; font-size: .75em; margin-top: 10px; }
    th, td { padding: 6px 10px; border-bottom: 1px solid var(--border); text-align: left; }
    th { font-family: 'Orbitron', monospace; color: var(--accent); font-size: .65em; letter-spacing: .1em; }
    tr:hover td { background: rgba(255,119,0,.04); }
    .ok  { color: var(--ok); font-weight: 700; }
    .warn { color: var(--warn); font-weight: 700; }
    .ng  { color: var(--ng); font-weight: 700; }
    .section-row td { background: rgba(26,48,96,.4); color: var(--text); font-weight: 700; }
  </style>
</head>
<body>

<header>
  <h1>🏗 要塞（フォートレス）— レイアウト設計図</h1>
  <span class="badge">自動計算 ver.1.0</span>
  <span class="badge" style="color:var(--ok); border-color:var(--ok);">5坪の秘密基地</span>
</header>

<div class="main-grid">
  <!-- LEFT: 断面図 -->
  <div class="panel">
    <div class="ptitle">▌ 断面図（側面・高さ確認）</div>
    <canvas id="elevCanvas" width="330" height="660"></canvas>
  </div>

  <!-- RIGHT: 平面図 -->
  <div class="panel">
    <div class="ptitle">▌ 各階 平面図</div>
    <div class="tabs">
      <button class="tab active" onclick="setFloor(0)">1階<br><span style="font-size:.8em">下道サーキット</span></button>
      <button class="tab" onclick="setFloor(1)">2階<br><span style="font-size:.8em">サーキット2F</span></button>
      <button class="tab" onclick="setFloor(2)">3階-左<br><span style="font-size:.8em">町づくり</span></button>
      <button class="tab" onclick="setFloor(3)">3階-右<br><span style="font-size:.8em">町づくり</span></button>
      <button class="tab" onclick="setFloor(4)">4階-左<br><span style="font-size:.8em">空港</span></button>
      <button class="tab" onclick="setFloor(5)">4階-右<br><span style="font-size:.8em">空港</span></button>
    </div>
    <canvas id="planCanvas" width="800" height="560"></canvas>
  </div>

  <!-- BOTTOM: 計算結果 -->
  <div class="bottom">
    <div class="ptitle">▌ 自動計算結果 一覧</div>
    <div class="calc-grid" id="calcCards"></div>
    <table id="calcTable" style="margin-top:16px"></table>
  </div>
</div>

<script>
// ============================================================
//  仕様定数（すべて mm）
// ============================================================
const S = {
  // ラック
  rackW: 915, rackD: 460,
  rackInnerW: 835, rackInnerD: 385,

  // 床板（カット後）1枚サイズ
  boardW: 910, boardD: 840, boardT: 12,

  // 2階のみフル2枚使用（1820×840mm）
  board2FW: 1820,
  // 2階道路幅（四周）
  roadW: 200,
  // 2階吹き抜けは自動計算 → board2FW - roadW*2, boardD - roadW*2
  get atriumW() { return this.board2FW - this.roadW * 2; }, // 1420
  get atriumD() { return this.boardD    - this.roadW * 2; }, // 440

  // 背中合わせ合計奥行
  get totalD() { return this.rackD * 2; }, // 920

  // 各階の床面高さ（mm、地面から床板上面まで）
  floors: [
    { id:'1F',   label:'下道サーキット（プラレール周遊・踏切・車庫）', h: 200,  color:'#1a3d5e', dark:'#0a1d2e', boardW: 1820 },
    { id:'2F',   label:'サーキットコース（1F/3Fへ車線変更）', h: 500,  color:'#1a4d2a', dark:'#0a2d16', boardW: 1820 },
    { id:'3F-L', label:'町づくりエリア（商業・信号・高低差・スケボー・土木・ロジ）', h: 800,  color:'#4a4a14', dark:'#2a2a08' },
    { id:'3F-R', label:'町づくりエリア（同上・作りこみ）',     h: 1100, color:'#5a3814', dark:'#2a1808' },
    { id:'4F-L', label:'空港（シンプル）',     h: 1400, color:'#14143a', dark:'#0a0a22' },
    { id:'4F-R', label:'空港（シンプル）',     h: 1700, color:'#1e1e50', dark:'#0e0e30' },
  ],

  // スロープ
  slopeAngle: 30, // degrees
  slopeW: 200,    // スロープ有効幅（mm）  ← RC車幅150+余裕50

  // プラレール
  railR:  216, railW: 38, railStraight: 214,

  // 車両（実測/公称）
  tomica: { w: 30, h: 40, l: 80,  name:'トミカ' },
  miniZ:  { w: 70, h: 46, l: 167, name:'ラジコン(Mini-Z系)' },
  lunch:  { w:150, h:140, l:190,  name:'ラジコン(1/24大型)' },

  // エレベーター穴
  elevW: 150, elevD: 150,
};

// ============================================================
//  自動計算
// ============================================================
const rad = a => a * Math.PI / 180;

function calcAll() {
  const res = {};

  // スロープ
  res.slopeAngle = S.slopeAngle;

  // 各フロア間ギャップ
  res.gaps = [];
  for (let i = 0; i < S.floors.length - 1; i++) {
    const dH = S.floors[i+1].h - S.floors[i].h;
    const slopeLen  = Math.round(dH / Math.sin(rad(S.slopeAngle)));
    const slopeRun  = Math.round(dH / Math.tan(rad(S.slopeAngle)));
    const clearH    = dH - S.boardT; // 有効高さ（天井クリアランス）
    const okMiniZ   = clearH >= S.miniZ.h  ? 'ok' : clearH >= S.miniZ.h*0.9  ? 'warn' : 'ng';
    const okLunch   = clearH >= S.lunch.h  ? 'ok' : clearH >= S.lunch.h*0.9  ? 'warn' : 'ng';
    const okTomica  = clearH >= S.tomica.h ? 'ok' : 'ng';
    res.gaps.push({
      from: S.floors[i].id, to: S.floors[i+1].id,
      dH, slopeLen, slopeRun, clearH,
      okMiniZ, okLunch, okTomica
    });
  }

  // プラレール楕円
  const ov = S.railR + S.railW/2;
  res.ovalW = Math.round(2 * ov);
  res.ovalL = Math.round(2 * ov + 2 * S.railStraight);
  res.ovalFitsW = res.ovalW <= S.boardD && res.ovalL <= S.boardW;

  // ベニヤカット指示
  res.boardW = S.boardW; res.boardD = S.boardD;

  // スロープ幅クリアランス
  res.slopeOkLunch  = S.slopeW >= S.lunch.w  ? 'ok' : 'ng';
  res.slopeOkMiniZ  = S.slopeW >= S.miniZ.w  ? 'ok' : 'ok';
  res.slopeOkTomica = S.slopeW >= S.tomica.w ? 'ok' : 'ok';

  return res;
}

const CALC = calcAll();

// ============================================================
//  カードと表の描画
// ============================================================
function renderCalcCards() {
  const cards = [
    { label:'ベニヤ板（カット後）', val: `${S.boardW} × ${S.boardD}`, unit:'mm' },
    { label:'スロープ長さ（1F→2F）', val: CALC.gaps[0].slopeLen, unit:'mm (30°)' },
    { label:'スロープ水平距離', val: CALC.gaps[0].slopeRun, unit:'mm' },
    { label:'スロープ有効幅', val: S.slopeW, unit:'mm' },
    { label:'プラレール楕円 横', val: CALC.ovalW, unit:'mm' },
    { label:'プラレール楕円 縦', val: CALC.ovalL, unit:'mm' },
    { label:'2階ボード（フル2枚）', val: `${S.board2FW} × ${S.boardD}`, unit:'mm' },
    { label:'2階 道路幅', val: S.roadW, unit:'mm（四周）' },
    { label:'2階 吹き抜け開口', val: `${S.atriumW} × ${S.atriumD}`, unit:'mm（自動計算）' },
    { label:'エレベーター穴', val: `${S.elevW} × ${S.elevD}`, unit:'mm' },
  ];
  document.getElementById('calcCards').innerHTML = cards.map(c => `
    <div class="calc-card">
      <div class="clabel">${c.label}</div>
      <div class="cval">${c.val} <span class="cunit">${c.unit}</span></div>
    </div>
  `).join('');
}

function renderCalcTable() {
  const rows = [];
  // スロープ・クリアランス
  rows.push(`<tr class="section-row"><td colspan="7">【スロープ・クリアランス一覧】</td></tr>`);
  rows.push(`<tr><th>区間</th><th>高低差</th><th>スロープ長</th><th>水平距離</th><th>天井高</th><th>トミカ 通過？</th><th>ラジコン(小型) 通過？</th></tr>`);
  for (const g of CALC.gaps) {
    const toLabel = g.okTomica === 'ok' ? '● 問題なし' : g.okTomica === 'warn' ? '▲ 要確認' : '✕ 不可';
    const rcLabel = g.okMiniZ  === 'ok' ? '● 問題なし' : g.okMiniZ  === 'warn' ? '▲ 要確認' : '✕ 不可';
    rows.push(`<tr>
      <td>${g.from} → ${g.to}</td>
      <td>${g.dH} mm</td>
      <td>${g.slopeLen} mm</td>
      <td>${g.slopeRun} mm</td>
      <td>${g.clearH} mm</td>
      <td class="${g.okTomica}">${toLabel}</td>
      <td class="${g.okMiniZ}">${rcLabel}</td>
    </tr>`);
  }

  // 車両クリアランス
  rows.push(`<tr class="section-row"><td colspan="7">【車両クリアランス基準値】</td></tr>`);
  rows.push(`<tr><th>車両種類</th><th>幅</th><th>長さ</th><th>高さ</th><th>スロープ幅 ${S.slopeW}mm 通過？</th><th>1階 天井高 ${CALC.gaps[0].clearH}mm？</th><th>2階 天井高 ${CALC.gaps[1].clearH}mm？</th></tr>`);
  for (const v of [S.tomica, S.miniZ, S.lunch]) {
    const sw = S.slopeW >= v.w ? 'ok' : 'ng';
    const c1 = CALC.gaps[0].clearH >= v.h ? 'ok' : (CALC.gaps[0].clearH >= v.h*0.9 ? 'warn' : 'ng');
    const c2 = CALC.gaps[1].clearH >= v.h ? 'ok' : (CALC.gaps[1].clearH >= v.h*0.9 ? 'warn' : 'ng');
    const fmtSw = sw === 'ok' ? '● 問題なし' : '✕ 要変更';
    const fmtC1 = c1 === 'ok' ? '● 問題なし' : c1 === 'warn' ? '▲ 要確認' : '✕ 不可';
    const fmtC2 = c2 === 'ok' ? '● 問題なし' : c2 === 'warn' ? '▲ 要確認' : '✕ 不可';
    rows.push(`<tr>
      <td>${v.name}</td>
      <td>${v.w} mm</td>
      <td>${v.l} mm</td>
      <td>${v.h} mm</td>
      <td class="${sw}">${fmtSw}</td>
      <td class="${c1}">${fmtC1}</td>
      <td class="${c2}">${fmtC2}</td>
    </tr>`);
  }

  // プラレール
  rows.push(`<tr class="section-row"><td colspan="7">【プラレール周回コース（1階）】</td></tr>`);
  rows.push(`<tr><th>項目</th><th colspan="2">寸法</th><th colspan="2">床板に収まるか？</th><th colspan="2">備考</th></tr>`);
  const fitsLabel = CALC.ovalFitsW ? '● 収まる' : '✕ はみ出る';
  rows.push(`<tr>
    <td>最小楕円コース</td>
    <td colspan="2">${CALC.ovalW} mm × ${CALC.ovalL} mm</td>
    <td colspan="2" class="${CALC.ovalFitsW ? 'ok':'ng'}">${fitsLabel}（床板 ${S.boardD}mm×${S.boardW}mm）</td>
    <td colspan="2">曲線R＝${S.railR}mm ＋ 直線${S.railStraight}mm×2本</td>
  </tr>`);

  document.getElementById('calcTable').innerHTML = rows.join('');
}

// ============================================================
//  断面図（エレベーション）の描画
// ============================================================
function drawElevation() {
  const cv = document.getElementById('elevCanvas');
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  ctx.clearRect(0, 0, W, H);

  // 描画エリア（padding）
  const PAD = { l: 65, r: 30, t: 30, b: 45 };
  const dW = W - PAD.l - PAD.r;
  const dH = H - PAD.t - PAD.b;

  // スケール: 高さ方向
  const maxH = 1850;
  const scY = dH / maxH; // px per mm (vertical)
  // 幅方向は模式的に奥行を表示 (920mm)
  const scX = dW / S.totalD;

  // 座標変換（底から積み上げ）
  const tx = x => PAD.l + x * scX;
  const ty = y => PAD.t + dH - y * scY;

  // 背景グリッド
  ctx.strokeStyle = '#0f1e30';
  ctx.lineWidth = 1;
  for (let yg = 0; yg <= maxH; yg += 100) {
    ctx.beginPath();
    ctx.moveTo(PAD.l, ty(yg));
    ctx.lineTo(W - PAD.r, ty(yg));
    ctx.stroke();
  }

  // ラック柱（4本: 前後左右）
  const pillars = [0, 25, S.totalD - 25, S.totalD]; // 奥行方向の位置
  ctx.fillStyle = '#1a3060';
  for (const p of pillars) {
    ctx.fillRect(tx(p) - 4, ty(1550), 8, 1550 * scY);
  }

  // 地面
  ctx.fillStyle = '#3a5a7a';
  ctx.fillRect(PAD.l - 20, ty(0), dW + 30, 3);
  ctx.fillStyle = '#3a5a7a';
  ctx.font = '10px Share Tech Mono';
  ctx.fillText('GL ±0', PAD.l - 60, ty(0) + 4);

  // 各フロア
  for (let i = 0; i < S.floors.length; i++) {
    const f = S.floors[i];
    const yTop = f.h;
    const yBot = f.h - S.boardT;

    // 床板
    ctx.fillStyle = f.color;
    ctx.fillRect(tx(40), ty(yTop), tx(S.totalD - 40) - tx(40), S.boardT * scY);

    // 床板枠線
    ctx.strokeStyle = '#4a8aaa';
    ctx.lineWidth = 1;
    ctx.strokeRect(tx(40), ty(yTop), tx(S.totalD - 40) - tx(40), S.boardT * scY);

    // 高さラベル（左）
    ctx.fillStyle = '#ff7700';
    ctx.font = 'bold 11px Share Tech Mono';
    ctx.textAlign = 'right';
    ctx.fillText(`${f.h}`, PAD.l - 8, ty(yTop) + 4);

    // 階ID
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 10px Orbitron, monospace';
    ctx.textAlign = 'left';
    ctx.fillText(f.id, tx(45), ty(yTop) - 4);

    // クリアランス矢印（下のフロアと比較）
    if (i > 0) {
      const clearH = f.h - S.floors[i-1].h - S.boardT;
      const midY = (f.h + S.floors[i-1].h) / 2;
      ctx.fillStyle = '#3a7a5a';
      ctx.font = '9px Share Tech Mono';
      ctx.textAlign = 'center';
      ctx.fillText(`↕${clearH}mm`, tx(S.totalD - 50), ty(midY));
    }
  }

  // スロープ線
  ctx.setLineDash([4, 3]);
  ctx.strokeStyle = '#ff7700';
  ctx.lineWidth = 1.5;
  for (let i = 0; i < S.floors.length - 1; i++) {
    const g = CALC.gaps[i];
    const x1 = tx(80), y1 = ty(S.floors[i].h);
    const x2 = tx(80 + g.slopeRun * scX / scX * 0.6), y2 = ty(S.floors[i+1].h);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    ctx.fillStyle = '#ff9944';
    ctx.font = '9px Share Tech Mono';
    ctx.textAlign = 'left';
    ctx.fillText(`${g.slopeLen}mm`, (x1 + x2) / 2 + 2, (y1 + y2) / 2 - 4);
  }
  ctx.setLineDash([]);

  // 縦軸ラベル
  ctx.save();
  ctx.translate(12, ty(maxH / 2));
  ctx.rotate(-Math.PI / 2);
  ctx.fillStyle = '#3a6a9a';
  ctx.font = '10px Share Tech Mono';
  ctx.textAlign = 'center';
  ctx.fillText('高さ（mm / 地面基準）', 0, 0);
  ctx.restore();

  // 奥行ラベル
  ctx.fillStyle = '#3a6a9a';
  ctx.font = '9px Share Tech Mono';
  ctx.textAlign = 'center';
  ctx.fillText(`← 奥行 ${S.totalD}mm (ラック背中合わせ) →`, tx(S.totalD / 2), H - 8);
}

// ============================================================
//  平面図の描画
// ============================================================
let currentFloor = 0;

function setFloor(idx) {
  currentFloor = idx;
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  drawPlan(idx);
}

function drawPlan(floorIdx) {
  const cv = document.getElementById('planCanvas');
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  ctx.clearRect(0, 0, W, H);

  const f = S.floors[floorIdx];
  const floorBW = f.boardW || S.boardW; // 2Fは1820、それ以外は910
  const PAD = { l: 70, r: 40, t: 50, b: 60 };
  const dW = W - PAD.l - PAD.r;
  const dH = H - PAD.t - PAD.b;

  // スケール（階ごとのボードサイズを描画エリアに合わせる）
  const sc = Math.min(dW / floorBW, dH / S.boardD);
  const bW = floorBW * sc;
  const bD = S.boardD * sc;
  const bX = PAD.l + (dW - bW) / 2;
  const bY = PAD.t + (dH - bD) / 2;

  // 座標変換
  const tx = x => bX + x * sc;
  const ty = y => bY + y * sc;

  // グリッド（100mmごと）
  ctx.strokeStyle = '#0e1a28';
  ctx.lineWidth = 1;
  for (let gx = 0; gx <= floorBW; gx += 100) {
    ctx.beginPath();
    ctx.moveTo(tx(gx), bY);
    ctx.lineTo(tx(gx), bY + bD);
    ctx.stroke();
  }
  for (let gy = 0; gy <= S.boardD; gy += 100) {
    ctx.beginPath();
    ctx.moveTo(bX, ty(gy));
    ctx.lineTo(bX + bW, ty(gy));
    ctx.stroke();
  }

  // ボード背景
  ctx.fillStyle = f.dark;
  ctx.fillRect(bX, bY, bW, bD);
  ctx.strokeStyle = '#4a8aaa';
  ctx.lineWidth = 2;
  ctx.strokeRect(bX, bY, bW, bD);

  // 中央足場ライン（サポート位置）
  ctx.setLineDash([4, 4]);
  ctx.strokeStyle = '#5a7a9a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(tx(0), ty(S.boardD / 2));
  ctx.lineTo(tx(floorBW), ty(S.boardD / 2));
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#4a7a9a';
  ctx.font = '9px Share Tech Mono';
  ctx.textAlign = 'right';
  ctx.fillText('▸ 中央足場', tx(floorBW) - 2, ty(S.boardD / 2) - 3);

  // ラック支持ライン（奥行方向の両端40mm内側）
  const suppY1 = 40 * sc;
  const suppY2 = (S.boardD - 40) * sc;
  ctx.setLineDash([2, 4]);
  ctx.strokeStyle = '#2a4a6a';
  ctx.lineWidth = 1;
  for (const sy of [suppY1, suppY2]) {
    ctx.beginPath();
    ctx.moveTo(bX, bY + sy);
    ctx.lineTo(bX + bW, bY + sy);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // 階別コンテンツ
  switch (floorIdx) {
    case 0: drawFloor1F(ctx, tx, ty, sc, bX, bY, bW, bD); break;
    case 1: drawFloor2F(ctx, tx, ty, sc, bX, bY, bW, bD); break;
    case 2: drawFloor3FL(ctx, tx, ty, sc, bX, bY, bW, bD); break;
    case 3: drawFloor3FR(ctx, tx, ty, sc, bX, bY, bW, bD); break;
    case 4: drawFloor4FL(ctx, tx, ty, sc, bX, bY, bW, bD); break;
    case 5: drawFloor4FR(ctx, tx, ty, sc, bX, bY, bW, bD); break;
  }

  // 寸法線（下）
  drawDimLine(ctx, bX, bY + bD + 20, bX + bW, bY + bD + 20, `${floorBW} mm`, '#ff7700');
  // 寸法線（左）
  drawDimLineV(ctx, bX - 20, bY, bX - 20, bY + bD, `${S.boardD} mm`, '#ff7700');

  // タイトル
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold 13px Orbitron, monospace`;
  ctx.textAlign = 'center';
  ctx.fillText(`${f.id}  ${f.label}`, W / 2, 24);
  ctx.fillStyle = '#ff7700';
  ctx.font = '11px Share Tech Mono';
  ctx.fillText(`GL + ${f.h} mm`, W / 2, 40);
}

// ============================================================
//  1F：下道サーキット（フル 1820×840mm）
//   プラレールフル周遊・踏切・丘・道・車庫／走るメイン
// ============================================================
function drawFloor1F(ctx, tx, ty, sc, bX, bY, bW, bD) {
  // ====== 背景：薄暗い地面 ======
  ctx.fillStyle = '#0c1410';
  ctx.fillRect(bX, bY, bW, bD);

  // ====== 板継ぎ目（910mm） ======
  ctx.setLineDash([3, 5]);
  ctx.strokeStyle = '#2a4a6a';
  ctx.lineWidth = 1;
  const seamX = tx(S.boardW);
  ctx.beginPath(); ctx.moveTo(seamX, bY); ctx.lineTo(seamX, bY + bD); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#2a4a6a';
  ctx.font = '8px Share Tech Mono';
  ctx.textAlign = 'center';
  ctx.fillText('板継ぎ目 910mm', seamX, bY + 10);

  // ====== 下道（車道・横断道路）- ボード中央を横切る ======
  const roadY = ty(S.boardD / 2);
  ctx.fillStyle = '#2e2e2e';
  ctx.fillRect(bX + 8, roadY - 36 * sc, bW - 16, 72 * sc);
  ctx.strokeStyle = '#4a4a4a';
  ctx.lineWidth = 1;
  ctx.strokeRect(bX + 8, roadY - 36 * sc, bW - 16, 72 * sc);
  // センターライン（黄色破線）
  ctx.setLineDash([12, 10]);
  ctx.strokeStyle = '#eecc00';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(bX + 10, roadY);
  ctx.lineTo(bX + bW - 10, roadY);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#888888';
  ctx.font = '9px Share Tech Mono';
  ctx.textAlign = 'left';
  ctx.fillText('下道（トミカ・ラジコン走行路）', bX + 18, roadY - 38 * sc);

  // ====== プラレール フル周遊コース（大楕円） ======
  const plCX = tx(S.board2FW / 2);
  const plCY = ty(S.boardD / 2);
  const plRx = (S.board2FW - 100) / 2 * sc;
  const plRy = (S.boardD - 100) / 2 * sc;

  // 枕木ベース
  ctx.strokeStyle = '#1a4080';
  ctx.lineWidth = S.railW * sc + 4;
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.ellipse(plCX, plCY, plRx, plRy, 0, 0, Math.PI * 2);
  ctx.stroke();
  // レール（明るい青）
  ctx.strokeStyle = '#55aaff';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.ellipse(plCX, plCY, plRx, plRy, 0, 0, Math.PI * 2);
  ctx.stroke();

  // 進行方向矢印（時計回り：右→下→左→上）
  const arrowAngles = [0, Math.PI * 0.5, Math.PI, Math.PI * 1.5];
  const arrowDirs   = ['down', 'left', 'up', 'right'];
  arrowAngles.forEach((angle, i) => {
    const ax = plCX + plRx * Math.cos(angle);
    const ay = plCY + plRy * Math.sin(angle);
    drawCircuitArrow(ctx, ax, ay, arrowDirs[i], 7, '#88ccff');
  });

  ctx.fillStyle = '#55aaff';
  ctx.font = '10px Share Tech Mono';
  ctx.textAlign = 'center';
  ctx.fillText('プラレール フル周遊コース（時計回り）', plCX, bY + 35);

  // ====== 丘（起伏）- 楕円内部の地形 ======
  // 丘1：左上エリア
  ctx.fillStyle = 'rgba(95, 72, 42, 0.92)';
  ctx.strokeStyle = '#c09050';
  ctx.lineWidth = 1.5;
  roundRect(ctx, tx(180), ty(130), 200 * sc, 100 * sc, 18);
  ctx.fill();
  roundRect(ctx, tx(180), ty(130), 200 * sc, 100 * sc, 18);
  ctx.stroke();
  ctx.fillStyle = '#e0b870';
  ctx.font = 'bold 10px Share Tech Mono';
  ctx.textAlign = 'center';
  ctx.fillText('丘 ▲', tx(280), ty(180));
  ctx.font = '8px Share Tech Mono';
  ctx.fillStyle = '#b08848';
  ctx.fillText('起伏地形', tx(280), ty(197));

  // 丘2：右下エリア
  ctx.fillStyle = 'rgba(100, 78, 46, 0.90)';
  ctx.strokeStyle = '#c49858';
  ctx.lineWidth = 1.5;
  roundRect(ctx, tx(1380), ty(580), 240 * sc, 130 * sc, 22);
  ctx.fill();
  roundRect(ctx, tx(1380), ty(580), 240 * sc, 130 * sc, 22);
  ctx.stroke();
  ctx.fillStyle = '#e0b870';
  ctx.font = 'bold 10px Share Tech Mono';
  ctx.textAlign = 'center';
  ctx.fillText('丘 ▲', tx(1500), ty(645));
  ctx.font = '8px Share Tech Mono';
  ctx.fillStyle = '#b08848';
  ctx.fillText('起伏地形', tx(1500), ty(662));

  // ====== IoT 自動踏切（プラレールと道路の交差） ======
  const crX = plCX + plRx * 0.45;
  const crY = plCY;
  ctx.fillStyle = '#882222';
  roundRect(ctx, crX - 22 * sc, crY - 38 * sc, 44 * sc, 76 * sc, 4);
  ctx.fill();
  ctx.strokeStyle = '#ff4444';
  ctx.lineWidth = 2;
  roundRect(ctx, crX - 22 * sc, crY - 38 * sc, 44 * sc, 76 * sc, 4);
  ctx.stroke();
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 9px Share Tech Mono';
  ctx.textAlign = 'center';
  ctx.fillText('IoT踏切', crX, crY - 5 * sc);
  ctx.fillText('(車道横断)', crX, crY + 9 * sc);
  // 踏切の警報灯（赤ドット2つ）
  ctx.fillStyle = '#ff2222';
  ctx.beginPath(); ctx.arc(crX - 8 * sc, crY - 24 * sc, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(crX + 8 * sc, crY - 24 * sc, 3, 0, Math.PI * 2); ctx.fill();

  // ====== プラレール車庫（右下エリア） ======
  const depotX = tx(S.board2FW - 320);
  const depotY = ty(S.boardD - S.elevD - 30);
  const depotW = 230 * sc, depotH = 100 * sc;
  ctx.fillStyle = '#1a2530';
  ctx.fillRect(depotX, depotY, depotW, depotH);
  ctx.strokeStyle = '#4a7aaa';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(depotX, depotY, depotW, depotH);
  // 車庫内 線路スタブ（3本）
  ctx.strokeStyle = '#336699';
  ctx.lineWidth = 1;
  for (let i = 0; i < 3; i++) {
    const lx = depotX + (35 + i * 65) * sc;
    ctx.beginPath(); ctx.moveTo(lx, depotY + 8); ctx.lineTo(lx, depotY + depotH - 8); ctx.stroke();
  }
  ctx.fillStyle = '#6a9aaa';
  ctx.font = 'bold 10px Share Tech Mono';
  ctx.textAlign = 'center';
  ctx.fillText('プラレール車庫', depotX + depotW / 2, depotY + depotH / 2 - 4);
  ctx.font = '8px Share Tech Mono';
  ctx.fillStyle = '#4a6a8a';
  ctx.fillText('停車・出庫', depotX + depotW / 2, depotY + depotH / 2 + 12);

  // ====== 昇降機（左下エリア・ボード内に収まる位置） ======
  const evX = tx(18);
  const evY = ty(S.boardD - S.elevD - 20);  // ← y座標バグ修正：S.boardD-elevD-margin
  ctx.fillStyle = '#111122';
  ctx.strokeStyle = '#ff7700';
  ctx.lineWidth = 2;
  ctx.fillRect(evX, evY, S.elevW * sc, S.elevD * sc);
  ctx.strokeRect(evX, evY, S.elevW * sc, S.elevD * sc);
  ctx.fillStyle = '#ff9900';
  ctx.font = '9px Share Tech Mono';
  ctx.textAlign = 'center';
  ctx.fillText('昇降機', evX + S.elevW * sc / 2, evY + S.elevD * sc / 2);
  ctx.fillText('↕2F', evX + S.elevW * sc / 2, evY + S.elevD * sc / 2 + 14);
  ctx.fillStyle = '#cc7700';
  ctx.font = '8px Share Tech Mono';
  ctx.fillText(`${S.elevW}×${S.elevD}mm`, evX + S.elevW * sc / 2, evY - 4);

  // ====== スロープ口（2階へ）右端 ======
  drawSlopeEntry(ctx, tx, ty, sc, S.board2FW - 10, S.boardD * 0.25, '2F↑', '#ff9933', 'right');

  // ====== 全幅寸法線 ======
  drawDimLine(ctx, tx(0), bY + bD + 20, tx(S.board2FW), bY + bD + 20, `全幅 ${S.board2FW}mm`, '#4a7aaa');
}

// ============================================================
//  2F：サーキットコース（フル 1820×840mm）
//   オーソドックスなサーキット／吹き抜けから1F・3Fへ車線変更で移動
// ============================================================
function drawFloor2F(ctx, tx, ty, sc, bX, bY, bW, bD) {
  const RW = S.roadW; // 道路幅 200mm

  const atW = S.atriumW * sc;
  const atH = S.atriumD * sc;
  const atX = bX + RW * sc;
  const atY = bY + RW * sc;

  // ====== サーキット路面（アスファルト） ======
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(bX, bY, bW, bD);

  // ====== 吹き抜け（中央） ======
  ctx.fillStyle = '#050510';
  ctx.fillRect(atX, atY, atW, atH);

  ctx.strokeStyle = '#ff7700';
  ctx.lineWidth = 2;
  ctx.setLineDash([5, 4]);
  ctx.strokeRect(atX, atY, atW, atH);
  ctx.setLineDash([]);

  ctx.fillStyle = '#ff9933';
  ctx.font = 'bold 11px Share Tech Mono';
  ctx.textAlign = 'center';
  ctx.fillText(`吹き抜け  ${S.atriumW}×${S.atriumD}mm`, atX + atW / 2, atY + atH / 2 - 16);
  ctx.font = '10px Share Tech Mono';
  ctx.fillStyle = '#55aaff';
  ctx.fillText('↓1F 下道・プラレール・踏切', atX + atW / 2, atY + atH / 2 + 2);
  ctx.fillStyle = '#ff9944';
  ctx.fillText('↑3F 町づくりエリア', atX + atW / 2, atY + atH / 2 + 18);

  // ====== サーキット走路（ロの字）中心線 ======
  ctx.setLineDash([12, 10]);
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1.5;

  const topMid = ty(RW / 2);
  const botMid = ty(S.boardD - RW / 2);
  const leftMid = tx(RW / 2);
  const rightMid = tx(S.board2FW - RW / 2);

  ctx.beginPath(); ctx.moveTo(bX + RW * sc, topMid); ctx.lineTo(bX + bW - RW * sc, topMid); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bX + RW * sc, botMid); ctx.lineTo(bX + bW - RW * sc, botMid); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(leftMid, bY + RW * sc); ctx.lineTo(leftMid, bY + bD - RW * sc); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(rightMid, bY + RW * sc); ctx.lineTo(rightMid, bY + bD - RW * sc); ctx.stroke();
  ctx.setLineDash([]);

  ctx.strokeStyle = '#666666';
  ctx.lineWidth = 1;
  ctx.strokeRect(atX, atY, atW, atH);
  ctx.strokeStyle = '#555555';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(bX + 2, bY + 2, bW - 4, bD - 4);

  // ====== 吹き抜け縁：1F・3Fへつながる車線変更レーン ======
  // 1Fへ下りる車線（吹き抜け右縁）
  const lane1FX = atX + atW - 2;
  const lane1FY = ty(S.boardD * 0.28);
  ctx.fillStyle = 'rgba(68,153,255,0.35)';
  ctx.fillRect(lane1FX, lane1FY - 25 * sc, 45 * sc, 50 * sc);
  ctx.strokeStyle = '#4499ff';
  ctx.lineWidth = 2;
  ctx.strokeRect(lane1FX, lane1FY - 25 * sc, 45 * sc, 50 * sc);
  ctx.fillStyle = '#4499ff';
  ctx.font = 'bold 9px Share Tech Mono';
  ctx.textAlign = 'center';
  ctx.fillText('1Fへ', lane1FX + 22 * sc, lane1FY - 2);
  ctx.fillText('下り', lane1FX + 22 * sc, lane1FY + 10);

  // 3Fへ上る車線（吹き抜け右縁・下側）
  const lane3FX = atX + atW - 2;
  const lane3FY = ty(S.boardD * 0.72);
  ctx.fillStyle = 'rgba(255,153,51,0.35)';
  ctx.fillRect(lane3FX, lane3FY - 25 * sc, 45 * sc, 50 * sc);
  ctx.strokeStyle = '#ff9933';
  ctx.lineWidth = 2;
  ctx.strokeRect(lane3FX, lane3FY - 25 * sc, 45 * sc, 50 * sc);
  ctx.fillStyle = '#ff9933';
  ctx.fillText('3Fへ', lane3FX + 22 * sc, lane3FY - 2);
  ctx.fillText('上り', lane3FX + 22 * sc, lane3FY + 10);

  // 車線変更の矢印（サーキット→吹き抜け方向）
  ctx.fillStyle = '#888888';
  ctx.font = '8px Share Tech Mono';
  ctx.textAlign = 'left';
  ctx.fillText('車線変更 →', lane1FX + 48 * sc, lane1FY);
  ctx.fillText('車線変更 →', lane3FX + 48 * sc, lane3FY);

  // ====== 走行方向矢印（時計回り） ======
  const mids = [
    { x: (leftMid + rightMid) / 2, y: topMid,  dir: 'right' },  // 上辺 → 右
    { x: rightMid,                 y: (topMid + botMid) / 2, dir: 'down'  }, // 右辺 → 下
    { x: (leftMid + rightMid) / 2, y: botMid,  dir: 'left'  },  // 下辺 → 左
    { x: leftMid,                  y: (topMid + botMid) / 2, dir: 'up'   }, // 左辺 → 上
  ];
  mids.forEach(m => drawCircuitArrow(ctx, m.x, m.y, m.dir, 8, '#aaffaa'));

  // ====== サーキットラベル ======
  ctx.fillStyle = '#44cc88';
  ctx.font = 'bold 11px Share Tech Mono';
  ctx.textAlign = 'center';
  ctx.fillText('2F サーキットコース（時計回り） 道路幅 ' + RW + 'mm', bX + bW / 2, topMid - 14);

  // ====== 板継ぎ目 ======
  ctx.setLineDash([3, 5]);
  ctx.strokeStyle = '#3a5a7a';
  ctx.lineWidth = 1;
  const seamX = tx(S.boardW);
  ctx.beginPath(); ctx.moveTo(seamX, bY); ctx.lineTo(seamX, bY + bD); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#3a5a7a';
  ctx.font = '8px Share Tech Mono';
  ctx.fillText('板継ぎ目 910mm', seamX, bY + 10);

  // ====== スロープ入口（外周） ======
  drawSlopeEntry(ctx, tx, ty, sc, 10, S.boardD * 0.28, '1階↓', '#4499ff', 'left');
  drawSlopeEntry(ctx, tx, ty, sc, S.board2FW - 10, S.boardD * 0.72, '3階↑', '#ff9933', 'right');

  // ====== 寸法 ======
  drawDimLine(ctx, atX, atY - 16, atX + atW, atY - 16, `吹き抜け ${S.atriumW}mm`, '#ff7700');
  drawDimLineV(ctx, atX + atW + 12, atY, atX + atW + 12, atY + atH, `${S.atriumD}mm`, '#ff7700');
}

// ============================================================
//  3F-L：町づくりエリア（左・低 800mm）910×840mm
//   商業・信号・高低差・スケボー・土木・ロジスティクス
// ============================================================
function drawFloor3FL(ctx, tx, ty, sc, bX, bY, bW, bD) {
  ctx.fillStyle = '#1a1810';
  ctx.fillRect(bX, bY, bW, bD);

  // ヘッダー
  ctx.fillStyle = 'rgba(80,70,40,0.35)';
  ctx.fillRect(bX, bY, bW, 28);
  ctx.fillStyle = '#ddcc88';
  ctx.font = 'bold 10px Share Tech Mono';
  ctx.textAlign = 'center';
  ctx.fillText('3F-L  町づくりエリア（作りこみ）  GL+800mm', bX + bW / 2, bY + 18);

  // ゾーン：街並み・商業エリア（3Dプリンタ）
  ctx.fillStyle = 'rgba(120,90,50,0.4)';
  roundRect(ctx, tx(40), ty(50), 280 * sc, 180 * sc, 8);
  ctx.fill();
  ctx.strokeStyle = '#aa8844';
  ctx.lineWidth = 1.5;
  roundRect(ctx, tx(40), ty(50), 280 * sc, 180 * sc, 8);
  ctx.stroke();
  ctx.fillStyle = '#ddbb66';
  ctx.font = 'bold 10px Share Tech Mono';
  ctx.textAlign = 'center';
  ctx.fillText('街並み・商業エリア', tx(40) + 140 * sc, ty(50) + 50 * sc);
  ctx.font = '9px Share Tech Mono';
  ctx.fillStyle = '#aa9966';
  ctx.fillText('3Dプリンタで作る店舗・ビル', tx(40) + 140 * sc, ty(50) + 70 * sc);

  // ゾーン：信号・電気ギミック
  ctx.fillStyle = 'rgba(80,120,80,0.35)';
  roundRect(ctx, tx(340), ty(50), 220 * sc, 120 * sc, 6);
  ctx.fill();
  ctx.strokeStyle = '#66aa66';
  ctx.lineWidth = 1.5;
  roundRect(ctx, tx(340), ty(50), 220 * sc, 120 * sc, 6);
  ctx.stroke();
  ctx.fillStyle = '#88cc88';
  ctx.font = 'bold 10px Share Tech Mono';
  ctx.fillText('信号・電気ギミック', tx(450), ty(50) + 42 * sc);
  ctx.font = '9px Share Tech Mono';
  ctx.fillStyle = '#66aa66';
  ctx.fillText('LED・センサー・制御', tx(450), ty(50) + 62 * sc);

  // ゾーン：高低差ルート
  ctx.fillStyle = 'rgba(70,60,90,0.4)';
  roundRect(ctx, tx(580), ty(50), 320 * sc, 120 * sc, 6);
  ctx.fill();
  ctx.strokeStyle = '#8877aa';
  ctx.lineWidth = 1.5;
  roundRect(ctx, tx(580), ty(50), 320 * sc, 120 * sc, 6);
  ctx.stroke();
  ctx.fillStyle = '#aa99cc';
  ctx.font = 'bold 10px Share Tech Mono';
  ctx.fillText('高低差のあるルート', tx(740), ty(50) + 42 * sc);
  ctx.font = '9px Share Tech Mono';
  ctx.fillStyle = '#8877aa';
  ctx.fillText('坂道・段差・立体交差', tx(740), ty(50) + 62 * sc);

  // ゾーン：スケボー風
  ctx.fillStyle = 'rgba(100,60,40,0.4)';
  roundRect(ctx, tx(40), ty(250), 260 * sc, 140 * sc, 6);
  ctx.fill();
  ctx.strokeStyle = '#cc7744';
  ctx.lineWidth = 1.5;
  roundRect(ctx, tx(40), ty(250), 260 * sc, 140 * sc, 6);
  ctx.stroke();
  ctx.fillStyle = '#eeaa77';
  ctx.font = 'bold 10px Share Tech Mono';
  ctx.fillText('スケボー風', tx(40) + 130 * sc, ty(250) + 55 * sc);
  ctx.font = '9px Share Tech Mono';
  ctx.fillStyle = '#cc8844';
  ctx.fillText('ランプ・障害物コース', tx(40) + 130 * sc, ty(250) + 75 * sc);

  // ゾーン：土木
  ctx.fillStyle = 'rgba(60,50,40,0.5)';
  roundRect(ctx, tx(320), ty(250), 260 * sc, 140 * sc, 6);
  ctx.fill();
  ctx.strokeStyle = '#886644';
  ctx.lineWidth = 1.5;
  roundRect(ctx, tx(320), ty(250), 260 * sc, 140 * sc, 6);
  ctx.stroke();
  ctx.fillStyle = '#aa8866';
  ctx.font = 'bold 10px Share Tech Mono';
  ctx.fillText('土木', tx(450), ty(250) + 55 * sc);
  ctx.font = '9px Share Tech Mono';
  ctx.fillStyle = '#886644';
  ctx.fillText('工事現場・ガタガタ道', tx(450), ty(250) + 75 * sc);

  // ゾーン：ロジスティクス
  ctx.fillStyle = 'rgba(50,70,100,0.4)';
  roundRect(ctx, tx(600), ty(250), 300 * sc, 140 * sc, 6);
  ctx.fill();
  ctx.strokeStyle = '#5588aa';
  ctx.lineWidth = 1.5;
  roundRect(ctx, tx(600), ty(250), 300 * sc, 140 * sc, 6);
  ctx.stroke();
  ctx.fillStyle = '#77aacc';
  ctx.font = 'bold 10px Share Tech Mono';
  ctx.fillText('ロジスティクス', tx(750), ty(250) + 55 * sc);

// ============================================================
//  ユーティリティ
// ============================================================
// 回路方向矢印（三角形）
function drawCircuitArrow(ctx, x, y, dir, size, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  switch (dir) {
    case 'right': ctx.moveTo(x + size, y); ctx.lineTo(x - size, y - size * 0.6); ctx.lineTo(x - size, y + size * 0.6); break;
    case 'down':  ctx.moveTo(x, y + size); ctx.lineTo(x - size * 0.6, y - size); ctx.lineTo(x + size * 0.6, y - size); break;
    case 'left':  ctx.moveTo(x - size, y); ctx.lineTo(x + size, y - size * 0.6); ctx.lineTo(x + size, y + size * 0.6); break;
    case 'up':    ctx.moveTo(x, y - size); ctx.lineTo(x - size * 0.6, y + size); ctx.lineTo(x + size * 0.6, y + size); break;
  }
  ctx.closePath();
  ctx.fill();
}

function drawSlopeEntry(ctx, tx, ty, sc, xMm, yMm, label, color, side) {
  const x = tx(xMm), y = ty(yMm);
  const w = 12, h = S.slopeW * sc;
  ctx.fillStyle = color;
  ctx.globalAlpha = 0.7;
  if (side === 'left') {
    ctx.fillRect(x - w / 2, y - h / 2, w, h);
  } else {
    ctx.fillRect(x - w / 2, y - h / 2, w, h);
  }
  ctx.globalAlpha = 1;
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  if (side === 'left') {
    ctx.strokeRect(x - w / 2, y - h / 2, w, h);
  } else {
    ctx.strokeRect(x - w / 2, y - h / 2, w, h);
  }
  ctx.fillStyle = color;
  ctx.font = 'bold 9px Share Tech Mono';
  ctx.textAlign = side === 'left' ? 'left' : 'right';
  ctx.fillText(label, side === 'left' ? x + w : x - w, y);
  ctx.fillStyle = '#888';
  ctx.font = '8px Share Tech Mono';
  ctx.textAlign = side === 'left' ? 'left' : 'right';
  ctx.fillText(`幅${S.slopeW}mm`, side === 'left' ? x + w : x - w, y + 12);
}

function drawDimLine(ctx, x1, y, x2, y2, label, color) {
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x1, y); ctx.lineTo(x1, y2 || y);
  ctx.moveTo(x1, y); ctx.lineTo(x2, y);
  ctx.moveTo(x2, y); ctx.lineTo(x2, y2 || y);
  ctx.stroke();
  // arrows
  ctx.fillStyle = color;
  arrowHead(ctx, x1, y, 'right');
  arrowHead(ctx, x2, y, 'left');
  ctx.font = '9px Share Tech Mono';
  ctx.textAlign = 'center';
  ctx.fillText(label, (x1 + x2) / 2, y - 4);
}

function drawDimLineV(ctx, x, y1, x2, y2, label, color) {
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x, y1); ctx.lineTo(x2 || x, y1);
  ctx.moveTo(x, y1); ctx.lineTo(x, y2);
  ctx.moveTo(x, y2); ctx.lineTo(x2 || x, y2);
  ctx.stroke();
  ctx.fillStyle = color;
  arrowHead(ctx, x, y1, 'down');
  arrowHead(ctx, x, y2, 'up');
  ctx.save();
  ctx.translate(x - 8, (y1 + y2) / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.font = '9px Share Tech Mono';
  ctx.textAlign = 'center';
  ctx.fillText(label, 0, 0);
  ctx.restore();
}

function arrowHead(ctx, x, y, dir) {
  ctx.beginPath();
  if (dir === 'right') { ctx.moveTo(x + 6, y); ctx.lineTo(x, y - 3); ctx.lineTo(x, y + 3); }
  else if (dir === 'left')  { ctx.moveTo(x - 6, y); ctx.lineTo(x, y - 3); ctx.lineTo(x, y + 3); }
  else if (dir === 'down')  { ctx.moveTo(x, y + 6); ctx.lineTo(x - 3, y); ctx.lineTo(x + 3, y); }
  else if (dir === 'up')    { ctx.moveTo(x, y - 6); ctx.lineTo(x - 3, y); ctx.lineTo(x + 3, y); }
  ctx.fill();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}
